name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: programa/package-lock.json

      - name: Install dependencies
        working-directory: programa
        run: npm ci

      - name: Build workspaces
        working-directory: programa
        run: npm run build
